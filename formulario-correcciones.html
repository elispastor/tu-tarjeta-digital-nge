<form name="solicitud" method="POST" data-netlify="true" enctype="multipart/form-data">
  
  <!-- CAMPO OCULTO OBLIGATORIO -->
  <input type="hidden" name="form-name" value="solicitud" />
  
  <!-- DATOS DEL CLIENTE -->
  <div class="grid md:grid-cols-2 gap-4 mb-4">
    <div>
      <label class="block text-gray-700 font-semibold mb-2">
        <i class="fas fa-user text-[#5d3a1a] mr-2"></i>Nombre completo*
      </label>
      <input type="text" name="nombre" required 
             class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition">
    </div>
    <div>
      <label class="block text-gray-700 font-semibold mb-2">
        <i class="fas fa-phone text-[#5d3a1a] mr-2"></i>WhatsApp*
      </label>
      <input type="tel" name="telefono" required 
             class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition">
    </div>
  </div>

  <!-- CORREO Y NOMBRE DEL NEGOCIO -->
  <div class="grid md:grid-cols-2 gap-4 mb-4">
    <div>
      <label class="block text-gray-700 font-semibold mb-2">
        <i class="fas fa-envelope text-[#5d3a1a] mr-2"></i>Correo electrónico*
      </label>
      <input type="email" name="email" required 
             class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition">
    </div>
    <div>
      <label class="block text-gray-700 font-semibold mb-2">
        <i class="fas fa-store text-[#5d3a1a] mr-2"></i>Nombre del negocio*
      </label>
      <input type="text" name="negocio" required 
             class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition">
    </div>
  </div>

  <!-- URL DEL SITIO -->
  <div class="mb-4">
    <label class="block text-gray-700 font-semibold mb-2">
      <i class="fas fa-globe text-[#5d3a1a] mr-2"></i>URL de tu tarjeta digital
    </label>
    <input type="url" name="url_sitio" placeholder="https://tusitio.netlify.app"
           class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition">
  </div>

  <!-- TIPO DE CAMBIO -->
  <div class="mb-4">
    <label class="block text-gray-700 font-semibold mb-2">
      <i class="fas fa-pencil-alt text-[#5d3a1a] mr-2"></i>Tipo de cambio que necesitas*
    </label>
    <select name="tipo_cambio" required 
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition bg-white">
      <option value="" disabled selected>Selecciona una opción</option>
      <option value="texto">📝 Cambiar texto</option>
      <option value="imagen">🖼️ Cambiar o agregar imagen</option>
      <option value="precio">💰 Actualizar precio</option>
      <option value="seccion">➕ Agregar nueva sección</option>
      <option value="color">🎨 Cambiar color</option>
      <option value="otro">🔧 Otro</option>
    </select>
  </div>

  <!-- DESCRIPCIÓN DEL CAMBIO -->
  <div class="mb-4">
    <label class="block text-gray-700 font-semibold mb-2">
      <i class="fas fa-align-left text-[#5d3a1a] mr-2"></i>Describe detalladamente el cambio*
    </label>
    <textarea name="descripcion" rows="4" required 
              class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition"
              placeholder="Ej: Quiero cambiar el teléfono por el nuevo número..."></textarea>
  </div>

  <!-- SUBIR ARCHIVO -->
  <div class="mb-6">
    <label class="block text-gray-700 font-semibold mb-2">
      <i class="fas fa-upload text-[#5d3a1a] mr-2"></i>Adjunta imagen de referencia
    </label>
    <input type="file" name="adjunto" accept="image/*,.pdf"
           class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5d3a1a] focus:outline-none transition bg-white">
    <p class="text-xs text-gray-500 mt-1">Máximo 5MB · Formatos: jpg, png, pdf</p>
  </div>

  <!-- BOTONES -->
  <div class="flex flex-col md:flex-row gap-4 mt-8">
    <button type="submit" 
            class="bg-[#5d3a1a] hover:bg-[#7a4f2a] text-white font-bold py-4 px-8 rounded-xl transition flex items-center justify-center gap-2 text-lg flex-1 border-2 border-[#e3c9a0]">
      <i class="fas fa-paper-plane"></i> ENVIAR SOLICITUD
    </button>
    <button type="reset" 
            class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 px-8 rounded-xl transition flex items-center justify-center gap-2 text-lg flex-1">
      <i class="fas fa-eraser"></i> LIMPIAR
    </button>
  </div>
</form>
